# Hybrid Search 配置 (BM25 + Vector)
# 基于 Qdrant 实现原生 Hybrid Search

enabled: true

# 存储配置
storage:
  path: "./storage/hybrid_search"
  collection_name_template: "doc_{document_id}"

# Chunking 配置
chunking:
  chunk_size: 512
  chunk_overlap: 50
  separators: ["\n\n", "\n", ". ", " "]
  
# Embedding 配置
embedding:
  # FastEmbed 模型选择
  # 轻量快速: "BAAI/bge-small-en-v1.5" (384维)
  # 通用: "sentence-transformers/all-MiniLM-L6-v2" (384维)
  # 多语言: "BAAI/bge-m3" (1024维)
  model: "BAAI/bge-small-en-v1.5"
  dimensions: 384  # 根据模型调整
  batch_size: 32

# Sparse/BM25 配置
sparse:
  # Qdrant 使用 BM42 (现代 BM25 实现)
  # 模型: Qdrant/bm42-all-minilm-l6-v2-attentions
  enabled: true

# Hybrid 融合配置
fusion:
  method: "rrf"  # 选项: rrf (Reciprocal Rank Fusion), dbsf (Distribution-Based Score Fusion)
  rrf_k: 60      # RRF 常数，通常 50-100，控制低排名衰减速度

# 检索配置
retrieval:
  top_k_sparse: 20   # BM25 检索数量
  top_k_dense: 20    # Vector 检索数量
  final_top_k: 10    # 融合后返回数量
